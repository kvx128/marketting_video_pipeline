<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tessact Dashboard</title>
    <!-- Using Tailwind for a clean, professional look -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-light">
    <nav class="p-6 border-b border-gray-200 bg-white">
        <h1 class="text-xs uppercase tracking-widest font-bold text-gray-400">Pipeline Status / Overview</h1>
    </nav>

    <main class="max-w-6xl mx-auto p-12">
        <div class="mb-12">
            <h2 class="text-4xl font-serif mb-2">Video Jobs</h2>
            <p class="text-gray-500">Recent generations and pipeline statuses.</p>
        </div>

        <div class="bg-white shadow-sm rounded-lg border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-100 text-xs uppercase tracking-widest text-gray-500">
                        <th class="p-4 font-bold">Client Name</th>
                        <th class="p-4 font-bold">Status</th>
                        <th class="p-4 font-bold">Time</th>
                        <th class="p-4 font-bold text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    {% for job in jobs %}
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <td class="p-4 font-medium">{{ job.client_name }}</td>
                        <td class="p-4">
                            <span class="{% if job.status == 'COMPLETED' %}text-green-600{% elif job.status == 'FAILED' %}text-red-600{% else %}text-orange-500{% endif %} font-medium">
                                {{ job.status }}
                            </span>
                        </td>
                        <td class="p-4 font-mono text-gray-500">
                            {{ job.total_time|default:"--"|floatformat:1 }}s
                        </td>
                        <td class="p-4 text-right">
                            <a href="{% url 'dashboard-monitor' job.id %}" class="text-indigo-600 hover:text-indigo-800 hover:underline">View Pipeline &rarr;</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-400 italic">No video jobs found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
